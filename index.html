<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> MR Yousef </title>
    <!-- استدعاء Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- استدعاء خط Tajawal للغة العربية -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
        }
        /* تأثيرات حركية بسيطة */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* تأثير تأخير النقاط المرتدة في شاشة التحميل */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }

        /* -- تصميم كلمة Yousef بتأثير الاندماج والحركة المستقلة -- */
        .name-wrapper {
            display: inline-flex;
            direction: ltr; /* لضمان ترتيب الحروف بالإنجليزية */
            margin-right: 8px; /* مسافة بين مستر والاسم */
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 1.3em;
            animation: wrapperMerge 6s infinite ease-in-out;
            padding: 0 5px;
        }

        /* تحريك المسافة بين الحروف لعمل تأثير الاندماج */
        @keyframes wrapperMerge {
            0%, 15% { letter-spacing: -25px; } /* مندمجة في نقطة واحدة */
            30%, 75% { letter-spacing: 2px; }  /* تتمدد لحالتها الطبيعية */
            90%, 100% { letter-spacing: -25px; } /* تعود للاندماج */
        }

        .letter {
            display: inline-block;
            animation: letterDance 6s infinite ease-in-out;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* تأخير كل حرف ليظهر ويتحرك بشكل مستقل (حرف بحرف) */
        .l-1 { animation-delay: 0.0s; }
        .l-2 { animation-delay: 0.15s; }
        .l-3 { animation-delay: 0.3s; }
        .l-4 { animation-delay: 0.45s; }
        .l-5 { animation-delay: 0.6s; }
        .l-6 { animation-delay: 0.75s; }

        /* حركة الحرف نفسه (يختفي، يظهر يكبر، يغير لونه، ويهتز) */
        @keyframes letterDance {
            0%, 15% { opacity: 0; transform: scale(0.1) rotate(0deg); color: #4f46e5; }
            25% { opacity: 1; transform: scale(1.3) translateY(-4px) rotate(-15deg); color: #ec4899; }
            35% { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); color: #4f46e5; }
            50% { transform: scale(1.2) rotate(10deg); color: #06b6d4; }
            60% { transform: scale(1) rotate(0deg); color: #4f46e5; }
            75% { opacity: 1; transform: scale(1.2) rotate(-10deg); color: #8b5cf6; }
            85%, 100% { opacity: 0; transform: scale(0.1) rotate(0deg); color: #4f46e5; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 sm:p-8 text-gray-800">

    <!-- شاشة التحميل -->
    <div id="loader" class="fixed inset-0 bg-gray-50 flex flex-col items-center justify-center z-50 transition-opacity duration-700">
        <div class="text-3xl sm:text-5xl font-black text-indigo-800 animate-pulse text-center space-y-4">
            <span class="text-5xl block mb-2"></span>
            <p> صل على النبى  </p>
        </div>
        <div class="mt-8 flex gap-2">
            <div class="w-3.5 h-3.5 bg-indigo-500 rounded-full animate-bounce"></div>
            <div class="w-3.5 h-3.5 bg-indigo-500 rounded-full animate-bounce delay-100"></div>
            <div class="w-3.5 h-3.5 bg-indigo-500 rounded-full animate-bounce delay-200"></div>
        </div>
    </div>

    <!-- حاوية التطبيق الرئيسية (مخفية في البداية) -->

    </div>

                question: "هل تتصاعد رائحة نشادر النفاذة؟",
                options: [
                    { text: "نعم، تتصاعد رائحة النشادر", isResult: true, resultName: "ساليسيلات الأمونيوم", formula: "C7H5O3NH4" },

                instruction: "عرفنا أنه ملح صوديوم. <b>خطوات اختبار الفيثالين:</b><br><ol class='list-decimal list-inside mt-2 text-sm space-y-1.5 text-right w-full font-semibold text-amber-950'><li>في أنبوبة <b>جافة</b>، ضع القليل من المادة الصلبة.</li><li>أضف كمية مساوية من <b>الفينول الصلب</b> + قطرتين <b>حمض كبريتيك مركز</b>.</li><li>سخن على اللهب حتى ينصهر الخليط.</li><li>اتركه يبرد قليلاً، ثم صبه في كأس به <b>محلول هيدروكسيد صوديوم (NaOH)</b>.</li></ol>",
                question: "ماذا حدث للون؟",

        // حالة التطبيق
        let currentStepId = 'start';

        function render() {
            const container = document.getElementById('app-container');
            const step = stepsData[currentStepId];

            let html = `
                <!-- شريط التقدم والمعلومات -->

                            <span class="letter l-2">o</span>
                            <span class="letter l-3">u</span>
                            <span class="letter l-4">s</span>
                            <span class="letter l-5">e</span>
                            <span class="letter l-6">f</span>
                        </span>
                    </h1>
                    ${history.length > 0 ? `
                        <button onclick="handleGoBack()" class="text-gray-500 hover:text-indigo-600 flex items-center gap-1 text-sm font-medium transition-colors">
                            ${icons.arrowRight}
                            تراجع للخطوة السابقة
                        </button>
                    ` : ''}
                </div>
            `;

            // عرض الاستنتاجات السابقة
            if (history.length > 0) {
                html += `<div class="mb-6 flex flex-wrap gap-2 fade-in">`;
                history.forEach(h => {
                    if (h.selectedNote) {
                        html += `
                            <span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-1 border border-indigo-200">
                                ${icons.checkCircleSm}
                                ${h.selectedNote}
                            </span>
                        `;
                    }
                });
                html += `</div>`;
            }

            // البطاقة الرئيسية
            html += `<div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 fade-in">`;

            if (finalResult) {
                // شاشة النتيجة النهائية
                html += `
                    <div class="p-10 text-center bg-green-50/30">
                        <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                            ${icons.checkCircleLg}
                        </div>
                        <h2 class="text-gray-500 font-semibold mb-2 text-lg">بناءً على خطواتك، المادة المجهولة هي:</h2>
                        <div class="text-4xl font-black text-green-700 mb-4 bg-white p-6 rounded-2xl shadow-sm border border-green-100 inline-block">
                            ${finalResult.name}
                        </div>
                        <p class="text-xl text-gray-400 font-mono mb-10" dir="ltr">${finalResult.formula}</p>
                        
                        <button onclick="handleRestart()" class="w-full sm:w-auto mx-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md hover:shadow-lg">
                            ${icons.rotateCcw}
                            فحص مادة مجهولة جديدة
                        </button>
                    </div>
                `;
            } else {
                // شاشة الخطوات والأسئلة
                html += `
                    <div class="p-8 sm:p-10">
                        <div class="flex flex-col items-center text-center mb-8">
                            ${step.icon}
                            <span class="text-sm font-bold text-indigo-500 tracking-wider mb-3 bg-indigo-50 px-4 py-1 rounded-full">
                                ${step.title}
                            </span>
                            
                            <!-- التجربة المطلوبة -->
                            <div class="bg-amber-50 border-r-4 border-amber-400 p-4 rounded-l-lg mb-8 w-full text-right relative">
                                ${step.typeTag ? step.typeTag : ''}
                                <h3 class="text-amber-800 font-bold mb-1 mt-1">طريقة العمل:</h3>
                                <p class="text-amber-900 leading-relaxed text-lg">${step.instruction}</p>
                            </div>

                            <h2 class="text-2xl font-bold text-gray-800">${step.question}</h2>
                        </div>
                        
                        <!-- خيارات الإجابة -->
                        <div class="space-y-4">
                `;

                step.options.forEach((option, idx) => {
                    html += `
                        <button onclick="handleOptionClick(${idx})" class="w-full text-right px-6 py-5 rounded-2xl border-2 border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 transition-all duration-200 group flex items-center justify-between">
                            <span class="text-lg font-semibold text-gray-700 group-hover:text-indigo-700">
                                ${option.text}
                            </span>
                            ${icons.arrowLeft}
                        </button>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        // معالجة اختيار خيار
        window.handleOptionClick = function(optionIndex) {
            const step = stepsData[currentStepId];
            const option = step.options[optionIndex];

            // حفظ الخطوة في السجل
            history.push({ stepId: currentStepId, selectedNote: option.note });

            if (option.isResult) {
                finalResult = { name: option.resultName, formula: option.formula };
            } else {
                currentStepId = option.target;
            }
            render();
        };

        // معالجة التراجع خطوة للخلف
        window.handleGoBack = function() {
            if (finalResult) {
                finalResult = null;
            } else if (history.length > 0) {
                const previousState = history.pop();
                currentStepId = previousState.stepId;
            }
            render();
        };

        // معالجة البدء من جديد
        window.handleRestart = function() {
            currentStepId = 'start';
            history = [];
            finalResult = null;
            render();
        };

        // إخفاء شاشة التحميل وإظهار التطبيق بعد مدة محددة
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const appContainer = document.getElementById('app-container');
                
                // إخفاء التحميل تدريجياً
                loader.classList.add('opacity-0');
                
                setTimeout(() => {
                    loader.classList.add('hidden'); // إزالته من مساحة العرض
                    
                    // إظهار واجهة التطبيق
                    appContainer.classList.remove('hidden');
                    
                    // تأخير بسيط جداً للسماح للمتصفح برسم العنصر قبل عمل الأنيميشن (fade in)
                    setTimeout(() => {
                        appContainer.classList.remove('opacity-0');
                        render(); // رسم الواجهة الأولى
                    }, 50);

                }, 700); // يجب أن تتوافق مع duration-700
            }, 2500); // مدة عرض شاشة "صلي على النبي" (ثانيتين ونصف)
        });

    </script>
</body>
</html>
